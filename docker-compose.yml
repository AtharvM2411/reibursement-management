version: '3.8'

services:
  
  mongodb:
    image: mongo:latest
    container_name: reimbursement-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: reimbursement-management
    volumes:
      - mongo_data:/data/db
    networks:
      - reimbursement-network

  
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: reimbursement-server
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/reimbursement-management
      JWT_SECRET: your-secret-key
      PORT: 3001
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - reimbursement-network
    command: npm run dev

  # Frontend Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: reimbursement-client
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:3001/api
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - reimbursement-network
    command: npm start

volumes:
  mongo_data:

networks:
  reimbursement-network:
    driver: bridge
